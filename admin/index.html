<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Familiar Stories Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/netlify-cms@^3.0.0/dist/netlify-cms.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f7f4ef;
    }
    .login-header {
      text-align: center;
      margin-top: 80px;
    }
    .login-header img {
      width: 120px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="login-header">
  <img src="../assets/images/familiar-stories-logo.jpg" />
  <h2>Familiar Stories CMS</h2>
</div>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.open();
      }
    });

    window.netlifyIdentity.on("login", () => {
      document.location.href = "/admin/";
    });
  }
</script>

</body>
</html>
