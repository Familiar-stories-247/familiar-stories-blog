<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CMS</title>
  </head>

  <body>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "Familiar-stories-247/familiar-stories-blog",
            branch: "main"
          },

          media_folder: "assets/images",
          public_folder: "/assets/images",

          collections: [
            {
              name: "blog_posts",   // 👈 IMPORTANT: changed name
              label: "Posts",
              folder: "data/posts",
              create: true,
              slug: "{{slug}}",

              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Category", name: "category", widget: "string" },
                { label: "Date", name: "date", widget: "datetime" },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>            }
          ]
        }
      });
    </script>
  </body>
</html>
